name: refresh plugins

# Keeps every vendored plugin current with its upstream GitHub source and re-applies
# the Cowork repackaging (skills-only; Claude-Code-only components stripped). Cowork's
# marketplace auto-update then pulls any committed change to installed machines.

on:
  schedule:
    - cron: "17 6 * * 1"   # every Monday 06:17 UTC
  workflow_dispatch: {}      # manual "Run workflow" button

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Re-vendor plugins from upstream
        run: python3 scripts/refresh.py
      - name: Commit changes if any
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name  "compendium-bot"
            git config user.email "actions@github.com"
            git add -A
            git commit -m "chore: refresh plugins from upstream ($(date -u +%Y-%m-%d))"
            git push
            echo "Committed plugin updates."
          else
            echo "No upstream changes."
          fi
